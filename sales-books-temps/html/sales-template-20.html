<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Receipt - Classic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', Georgia, serif; background: #d5d0c8; color: #333; }
  .page { width: 700px; min-height: 300px; margin: 50px auto; background: #fff; position: relative; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }

  /* Top Accent Lines */
  .top-accent { height: 4px; background: #111; }
  .top-accent2 { height: 2px; background: #111; margin-top: 2px; }

  .content { padding: 20px 30px 25px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .header-left { display: flex; align-items: flex-start; gap: 8px; }
  .title-block { }
  .cash-text { font-size: 28px; font-weight: 900; font-style: italic; line-height: 1; }
  .receipt-text { font-size: 28px; font-weight: 900; font-style: italic; line-height: 1; }
  .divider-lines { display: flex; flex-direction: column; gap: 3px; padding-top: 5px; }
  .divider-lines .line { width: 2px; height: 35px; background: #333; }

  .logo-area { text-align: right; }
  .logo-text { font-size: 22px; font-weight: 700; color: #333; letter-spacing: 3px; }

  /* No / Date Row */
  .meta-row { display: flex; justify-content: flex-end; gap: 40px; margin-bottom: 15px; font-size: 11px; }
  .meta-row .label { font-weight: 600; }
  .meta-row .dots { display: inline-block; width: 130px; border-bottom: 1px dotted #999; margin-left: 5px; }

  /* Form Fields */
  .form-fields { font-size: 11px; line-height: 3; }
  .field-row { display: flex; align-items: center; gap: 5px; }
  .field-label { font-weight: 400; white-space: nowrap; }
  .field-dots { flex: 1; border-bottom: 1px dotted #999; }

  /* Rs Box */
  .rs-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
  .rs-label { font-size: 11px; font-weight: 400; }
  .rs-box { width: 120px; height: 26px; border: 1.5px solid #333; }
  .in-cash { font-size: 11px; margin-left: 20px; }
  .in-cash-line { display: inline-block; width: 200px; border-bottom: 1px dotted #999; margin-left: 5px; }

  /* Drawn On / Account */
  .bottom-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 8px; }
  .drawn-line { font-size: 11px; }
  .drawn-dots { display: inline-block; width: 200px; border-bottom: 1px dotted #999; margin-left: 3px; }
  .sig-block { text-align: center; }
  .sig-box { width: 120px; height: 25px; border: 1.5px solid #333; margin-bottom: 3px; }
  .sig-label { font-size: 9px; font-weight: 600; }

  /* Bottom Accent Lines */
  .bottom-accent { height: 4px; background: #111; margin-top: 0; }
  .bottom-accent2 { height: 2px; background: #111; margin-bottom: 2px; }

  /* Website Footer */
  .footer { text-align: center; padding: 8px; font-size: 9px; color: #888; letter-spacing: 6px; font-family: Arial, sans-serif; }
</style>
</head>
<body>
<div class="page">
  <div class="top-accent"></div>
  <div class="top-accent2"></div>

  <div class="content">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="title-block">
          <div class="cash-text">CASH</div>
          <div class="receipt-text">RECEIPT</div>
        </div>
        <div class="divider-lines">
          <div class="line"></div>
          <div class="line" style="margin-left:4px;"></div>
        </div>
      </div>
      <div class="logo-area">
        <div class="logo-text">LOGO</div>
      </div>
    </div>

    <!-- No / Date -->
    <div class="meta-row">
      <div><span class="label">No.</span><span class="dots"></span></div>
      <div><span class="label">Date :</span><span class="dots"></span></div>
    </div>

    <!-- Form Fields -->
    <div class="form-fields">
      <div class="field-row">
        <span class="field-label">Received from</span>
        <span class="field-dots"></span>
      </div>
      <div class="field-row">
        <span class="field-label">a sum of Rs.</span>
        <span class="field-dots"></span>
      </div>
      <div class="field-row">
        <span class="field-dots"></span>
      </div>
    </div>

    <!-- Rs Box & In Cash -->
    <div class="rs-row">
      <span class="rs-label">Rs. (Fig.)</span>
      <div class="rs-box"></div>
      <span class="in-cash">in CASH/DD/CHEQUE No.<span class="in-cash-line"></span></span>
    </div>

    <!-- Drawn On & Account -->
    <div class="form-fields" style="margin-top:0;">
      <div class="field-row">
        <span class="field-label">Drawn On</span>
        <span class="field-dots"></span>
      </div>
    </div>

    <div class="bottom-row">
      <div class="drawn-line">On A/c of <span class="drawn-dots"></span></div>
      <div class="sig-block">
        <div class="sig-box"></div>
        <div class="sig-label">Receivers Signature</div>
      </div>
    </div>
  </div>

  <div class="bottom-accent2"></div>
  <div class="bottom-accent"></div>
</div>
</body>
</html>
